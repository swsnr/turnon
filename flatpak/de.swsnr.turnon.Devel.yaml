id: de.swsnr.turnon.Devel
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: de.swsnr.turnon.Devel
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
modules:
  - name: turnon
    buildsystem: simple
    sources:
      - type: dir
        path: ".."
    build-options:
      build-args:
        - --share=network
    build-commands:
      - python --version
      # Crudely assert that we're on a -dev version
      - grep version pyproject.toml | grep -q -- '[.-]dev'
      - pip3 install --prefix=/app .
      - mv /app/bin/de.swsnr.turnon /app/bin/de.swsnr.turnon.Devel
      - glib-compile-schemas /app/share/glib-2.0/schemas
