on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  python:
    runs-on: codeberg-tiny-lazy
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      # Skip blueprint, msgfmt, and GLib schemas on CI, and don't install
      # pygobject, because we're lacking all their system dependencies.
      - run: env SKIP_BLUEPRINT=1 SKIP_MSGFMT=1 SKIP_SCHEMAS=1 uv sync --locked --no-install-package pygobject
      - run: env UV_NO_SYNC=1 uv run poe lint:types
      - run: env UV_NO_SYNC=1 uv run pytest tests/pure/
      - run: env UV_NO_SYNC=1 uv run poe lint:python
      - run: env UV_NO_SYNC=1 uv run poe format:python --check
